version: '3.8'

services:
  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - research-ai-network
    restart: unless-stopped

  # Backend API service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/data/research_ai.db
      - OLLAMA_HOST=http://ollama:11434
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./outputs:/app/outputs
      - ./sessions:/app/sessions
      - ./data:/data
      - ./multi_agent/Latex_engine/workspace:/app/multi_agent/Latex_engine/workspace
    depends_on:
      - ollama
      - latex-compiler
    networks:
      - research-ai-network
    restart: unless-stopped

  # LaTeX compiler service
  latex-compiler:
    build:
      context: ./multi_agent/Latex_engine
      dockerfile: Dockerfile
    image: latex-compiler:latest
    volumes:
      - ./multi_agent/Latex_engine/workspace:/work
    networks:
      - research-ai-network
    restart: unless-stopped
    command: ["tail", "-f", "/dev/null"]  # Keep container running

  # Ollama service for local LLM
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - research-ai-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # MCP service for deep research
  mcp-service:
    build:
      context: ./mcp_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
    networks:
      - research-ai-network
    restart: unless-stopped

networks:
  research-ai-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local
